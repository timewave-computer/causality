# Purpose: Defines the dependencies and metadata for the causality-simulation crate.

[package]
name = "causality-simulation"
version = "0.1.0"
edition = "2021"
description = "Simulation framework for Causality actors and scenarios"
license = "MIT OR Apache-2.0"

[dependencies]
# External dependencies
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serde_yaml = "0.9"
toml = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true, features = ["full"] }
async-trait = "0.1"
futures = "0.3"
chrono = { workspace = true }
clap = { version = "4.3", features = ["derive", "env"] }
ctrlc = "3.2"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
rand = "0.8.5"

# Internal dependencies
causality-types = { workspace = true }
causality-error = { workspace = true }
causality-core = { workspace = true }
causality-runtime = { workspace = true, optional = true }
causality-tel = { workspace = true, optional = true }
causality-domain = { workspace = true }
causality-domain-sdk = { workspace = true, optional = true }

[features]
default = ["full"]
full = ["engine", "tel", "dep:causality-tel", "dep:causality-domain-sdk"]
engine = ["dep:causality-runtime"]
tel = ["dep:causality-tel"]

[dev-dependencies]
tempfile = "3.5.0"
mockall = "0.11.3"
